services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: animal
      POSTGRES_PASSWORD: animal
      POSTGRES_DB: animal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animal -d animal"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - animal_postgres:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://animal:animal@postgres:5432/animal?sslmode=disable",
        "up"
      ]

  animal-service:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    environment:
      ANIMAL_POSTGRES_URL: postgres://animal:animal@postgres:5432/animal?sslmode=disable
      ANIMAL_KAFKA_ENABLED: "true"
      ANIMAL_KAFKA_BROKERS: kafka:29092
      ANIMAL_GRPC_ADDR: 0.0.0.0:9090
      ANIMAL_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
      - "9090:9090"

volumes:
  animal_postgres:
