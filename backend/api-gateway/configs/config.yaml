service:
  name: api-gateway
  environment: local
  version: 0.1.0
  log_level: info

http:
  addr: 0.0.0.0:8080
  read_timeout: 10s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 15s
  max_body_bytes: 10485760
  cors_origins:
    - http://localhost:3000

grpc:
  auth_addr: localhost:15051
  animal_addr: localhost:19090
  feed_addr: localhost:18085
  matching_addr: localhost:19094
  chat_addr: localhost:19092
  billing_addr: localhost:19091
  analytics_addr: localhost:19096
  notification_enabled: false
  notification_addr: localhost:19097
  request_timeout: 3s
  retry_count: 2
  retry_backoff: 100ms
  breaker_name: api-gateway-downstream

redis:
  addr: localhost:6379
  password: ""
  db: 0
  timeout: 500ms

kafka:
  enabled: false
  brokers:
    - localhost:19093
  client_id: api-gateway

s3:
  enabled: false
  endpoint: localhost:9000
  access_key: minio
  secret_key: minio123
  bucket: petmatch-photos
  use_ssl: false
  public_url: http://localhost:9000/petmatch-photos

rate:
  window: 1m
  ip_limit: 600
  actor_limit: 300
  role_limit: 1000
  guest_limit: 120
  admin_role_limit: 5000

auth:
  tenant_id: default
  guest_secret: local-development-guest-secret
  guest_ttl: 24h
  feed_prefetch: 10
  max_page_size: 50
