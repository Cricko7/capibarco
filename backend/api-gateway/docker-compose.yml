services:
  api-gateway:
    build:
      context: .
    environment:
      API_GATEWAY_HTTP_ADDR: 0.0.0.0:8080
      API_GATEWAY_GRPC_AUTH_ADDR: host.docker.internal:15051
      API_GATEWAY_GRPC_ANIMAL_ADDR: host.docker.internal:19090
      API_GATEWAY_GRPC_FEED_ADDR: host.docker.internal:18085
      API_GATEWAY_GRPC_MATCHING_ADDR: host.docker.internal:19094
      API_GATEWAY_GRPC_CHAT_ADDR: host.docker.internal:19092
      API_GATEWAY_GRPC_BILLING_ADDR: host.docker.internal:19091
      API_GATEWAY_GRPC_ANALYTICS_ADDR: host.docker.internal:19096
      API_GATEWAY_GRPC_NOTIFICATION_ENABLED: "false"
      API_GATEWAY_GRPC_NOTIFICATION_ADDR: host.docker.internal:19097
      API_GATEWAY_REDIS_ADDR: redis:6379
      API_GATEWAY_KAFKA_ENABLED: "true"
      API_GATEWAY_KAFKA_BROKERS: redpanda:29092
      API_GATEWAY_S3_ENABLED: "true"
      API_GATEWAY_S3_ENDPOINT: minio:9000
      API_GATEWAY_S3_ACCESS_KEY: minio
      API_GATEWAY_S3_SECRET_KEY: minio123
      API_GATEWAY_S3_BUCKET: petmatch-photos
      API_GATEWAY_S3_PUBLIC_URL: http://localhost:19098/petmatch-photos
      API_GATEWAY_AUTH_TENANT_ID: default
      API_GATEWAY_AUTH_GUEST_SECRET: local-development-guest-secret
    ports:
      - "18088:8080"
    depends_on:
      redis:
        condition: service_started
      redpanda:
        condition: service_started
      minio:
        condition: service_started

  redis:
    image: redis:7.4-alpine
    ports:
      - "16379:6379"

  redpanda:
    image: redpandadata/redpanda:v24.3.3
    command:
      - redpanda
      - start
      - --set auto_create_topics_enabled=true
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:29092,external://localhost:19093
    ports:
      - "19093:9092"
      - "19644:9644"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "19098:9000"
      - "19099:9001"

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      sleep 3
      mc alias set local http://minio:9000 minio minio123
      mc mb --ignore-existing local/petmatch-photos
      mc anonymous set download local/petmatch-photos
