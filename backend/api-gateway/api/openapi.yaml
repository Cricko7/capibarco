openapi: 3.1.0
info:
  title: PetMatch API Gateway
  version: 0.1.0
servers:
  - url: http://localhost:18088
security:
  - BearerAuth: []
  - GuestSession: []
paths:
  /healthz:
    get:
      tags: [Ops]
      security: []
      responses:
        "200": { description: Healthy }
  /readyz:
    get:
      tags: [Ops]
      security: []
      responses:
        "200": { description: Ready }
        "503": { $ref: "#/components/responses/Problem" }
  /metrics:
    get:
      tags: [Ops]
      security: []
      responses:
        "200": { description: Prometheus metrics }
  /v1/auth/guest-sessions:
    post:
      tags: [Auth]
      security: []
      operationId: createGuestSession
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateGuestSessionRequest" }
      responses:
        "201":
          description: Guest session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateGuestSessionResponse" }
  /v1/auth/login:
    post:
      tags: [Auth]
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200": { description: Auth tokens }
        "401": { $ref: "#/components/responses/Problem" }
  /v1/auth/refresh:
    post:
      tags: [Auth]
      security: []
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshTokenRequest" }
      responses:
        "200": { description: Refreshed auth tokens }
        "401": { $ref: "#/components/responses/Problem" }
  /v1/auth/register:
    post:
      tags: [Auth]
      security: []
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "201": { description: User registered and auth tokens returned }
        "400": { $ref: "#/components/responses/Problem" }
  /v1/feed:
    get:
      tags: [Feed]
      operationId: getFeed
      parameters:
        - { name: surface, in: query, schema: { type: integer, default: 1 } }
        - { name: page_size, in: query, schema: { type: integer, default: 10, maximum: 50 } }
        - { name: page_token, in: query, schema: { type: string } }
      responses:
        "200": { description: Feed cards }
        "401": { $ref: "#/components/responses/Problem" }
        "429": { $ref: "#/components/responses/Problem" }
  /v1/animals/{animal_id}:
    get:
      tags: [Animals]
      operationId: getAnimal
      parameters:
        - { name: animal_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Animal profile }
        "404": { $ref: "#/components/responses/Problem" }
  /v1/animals:
    post:
      tags: [Animals]
      operationId: createAnimal
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "201": { description: Animal profile created }
  /v1/animals/{animal_id}/photos:
    post:
      tags: [Animals]
      operationId: uploadAnimalPhoto
      parameters:
        - { name: animal_id, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo: { type: string, format: binary }
                sort_order: { type: integer }
      responses:
        "201": { description: Photo stored and metadata registered }
  /v1/animals/{animal_id}/publish:
    post:
      tags: [Animals]
      operationId: publishAnimal
      parameters:
        - { name: animal_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Animal profile published }
  /v1/animals/{animal_id}/swipe:
    post:
      tags: [Matching]
      operationId: swipeAnimal
      parameters:
        - { name: animal_id, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SwipeAnimalRequest" }
      responses:
        "200": { description: Swipe recorded }
  /v1/animals/{animal_id}:swipe:
    post:
      tags: [Matching]
      operationId: swipeAnimalContractPath
      parameters:
        - { name: animal_id, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SwipeAnimalRequest" }
      responses:
        "200": { description: Swipe recorded }
  /v1/animals/{animal_id}/stats:
    get:
      tags: [Analytics]
      operationId: getAnimalStats
      parameters:
        - { name: animal_id, in: path, required: true, schema: { type: string } }
        - { name: bucket, in: query, schema: { type: integer } }
      responses:
        "200": { description: Animal statistics from analytics-service }
  /v1/profiles:
    get:
      tags: [Users]
      operationId: searchProfiles
      parameters:
        - { name: profile_type, in: query, schema: { type: integer }, description: Repeatable profile type filter }
        - { name: city, in: query, schema: { type: string } }
        - { name: min_average_rating, in: query, schema: { type: number, format: double } }
        - { name: query, in: query, schema: { type: string } }
        - { name: include_suspended, in: query, schema: { type: boolean, default: false } }
        - { name: page_size, in: query, schema: { type: integer, default: 20, maximum: 50 } }
        - { name: page_token, in: query, schema: { type: string } }
      responses:
        "200":
          description: Profiles page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchProfilesResponse" }
  /v1/profiles/{profile_id}:
    get:
      tags: [Users]
      operationId: getProfile
      parameters:
        - { name: profile_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetProfileResponse" }
    patch:
      tags: [Users]
      operationId: updateProfile
      parameters:
        - { name: profile_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProfileGatewayRequest" }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpdateProfileResponse" }
  /v1/profiles/{profile_id}/reviews:
    get:
      tags: [Users]
      operationId: listReviews
      parameters:
        - { name: profile_id, in: path, required: true, schema: { type: string } }
        - { name: page_size, in: query, schema: { type: integer, default: 20, maximum: 50 } }
        - { name: page_token, in: query, schema: { type: string } }
      responses:
        "200":
          description: Reviews page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListReviewsResponse" }
    post:
      tags: [Users]
      operationId: createReview
      parameters:
        - { name: profile_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReviewRequest" }
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateReviewResponse" }
  /v1/profiles/{profile_id}/reputation:
    get:
      tags: [Users]
      operationId: getReputationSummary
      parameters:
        - { name: profile_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Reputation summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GetReputationSummaryResponse" }
  /v1/reviews/{review_id}:
    patch:
      tags: [Users]
      operationId: updateReview
      parameters:
        - { name: review_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateReviewGatewayRequest" }
      responses:
        "200":
          description: Updated review
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpdateReviewResponse" }
  /v1/chat/conversations:
    get:
      tags: [Chat]
      operationId: listConversations
      parameters:
        - { name: page_size, in: query, schema: { type: integer, default: 20, maximum: 50 } }
        - { name: page_token, in: query, schema: { type: string } }
      responses:
        "200": { description: Conversations }
  /v1/chat/conversations/{conversation_id}/messages:
    get:
      tags: [Chat]
      operationId: listMessages
      parameters:
        - { name: conversation_id, in: path, required: true, schema: { type: string } }
        - { name: page_size, in: query, schema: { type: integer, default: 30, maximum: 50 } }
        - { name: page_token, in: query, schema: { type: string } }
      responses:
        "200": { description: Messages }
    post:
      tags: [Chat]
      operationId: sendMessage
      parameters:
        - { name: conversation_id, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageRequest" }
      responses:
        "201": { description: Message sent }
  /ws/chat:
    get:
      tags: [Chat]
      operationId: chatWebSocket
      parameters:
        - { name: access_token, in: query, schema: { type: string } }
      responses:
        "101": { description: WebSocket bridge to chat-service Connect stream }
  /v1/billing/donation-intents:
    post:
      tags: [Billing]
      operationId: createDonationIntent
      parameters:
        - { name: Idempotency-Key, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDonationIntentRequest" }
      responses:
        "201": { description: Donation payment intent }
  /v1/notifications:
    get:
      tags: [Notifications]
      operationId: listNotifications
      parameters:
        - { name: page_size, in: query, schema: { type: integer, default: 30, maximum: 50 } }
        - { name: page_token, in: query, schema: { type: string } }
      responses:
        "200": { description: Notification inbox }
        "501": { $ref: "#/components/responses/Problem" }
  /v1/notifications/stream:
    get:
      tags: [Notifications]
      operationId: streamNotifications
      responses:
        "200": { description: SSE stream from notification-service }
        "501": { $ref: "#/components/responses/Problem" }
  /v1/notifications/devices:
    post:
      tags: [Notifications]
      operationId: registerDevice
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterDeviceRequest" }
      responses:
        "201": { description: Device token registered }
  /v1/notifications/devices/{device_token_id}:
    delete:
      tags: [Notifications]
      operationId: unregisterDevice
      parameters:
        - { name: device_token_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Device token removed }
  /v1/notifications/{notification_id}/read:
    post:
      tags: [Notifications]
      operationId: markNotificationRead
      parameters:
        - { name: notification_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Notification marked read }
  /v1/notifications/{notification_id}:read:
    post:
      tags: [Notifications]
      operationId: markNotificationReadContractPath
      parameters:
        - { name: notification_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Notification marked read }
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    GuestSession:
      type: apiKey
      in: header
      name: X-Guest-Session-Token
  schemas:
    CreateGuestSessionRequest:
      type: object
      required: [device_id]
      properties:
        device_id: { type: string }
        locale: { type: string }
    CreateGuestSessionResponse:
      type: object
      required: [guest_session_token, expires_at, allowed_scopes]
      properties:
        guest_session_token: { type: string }
        expires_at: { type: string, format: date-time }
        allowed_scopes:
          type: array
          items: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        locale: { type: string }
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    SwipeAnimalRequest:
      type: object
      required: [owner_profile_id, direction]
      properties:
        owner_profile_id: { type: string }
        direction: { type: integer, enum: [1, 2] }
        feed_card_id: { type: string }
        feed_session_id: { type: string }
    SendMessageRequest:
      type: object
      required: [type, text]
      properties:
        type: { type: integer, default: 1 }
        text: { type: string }
        client_message_id: { type: string }
    CreateDonationIntentRequest:
      type: object
      required: [target_type, target_id, amount, provider]
      properties:
        target_type: { type: integer }
        target_id: { type: string }
        amount:
          type: object
          properties:
            currency_code: { type: string }
            units: { type: integer, format: int64 }
            nanos: { type: integer }
        provider: { type: string }
    RegisterDeviceRequest:
      type: object
      required: [token, platform]
      properties:
        token: { type: string }
        platform: { type: string, enum: [ios, android, web] }
        locale: { type: string }
    PageResponse:
      type: object
      properties:
        next_page_token: { type: string }
    AuditMetadata:
      type: object
      properties:
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Address:
      type: object
      properties:
        country_code: { type: string }
        region: { type: string }
        city: { type: string }
        district: { type: string }
        address_line: { type: string }
        postal_code: { type: string }
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
    ReputationSummary:
      type: object
      properties:
        profile_id: { type: string }
        average_rating: { type: number, format: double }
        reviews_count: { type: integer }
        completed_adoptions_count: { type: integer }
        updated_at: { type: string, format: date-time }
    UserProfile:
      type: object
      properties:
        profile_id: { type: string }
        auth_user_id: { type: string }
        profile_type: { type: integer, enum: [0, 1, 2, 3] }
        display_name: { type: string }
        bio: { type: string }
        avatar_url: { type: string }
        address: { $ref: "#/components/schemas/Address" }
        visibility: { type: integer }
        reputation: { $ref: "#/components/schemas/ReputationSummary" }
        audit: { $ref: "#/components/schemas/AuditMetadata" }
    Review:
      type: object
      properties:
        review_id: { type: string }
        target_profile_id: { type: string }
        author_profile_id: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        match_id: { type: string }
        visibility: { type: integer }
        audit: { $ref: "#/components/schemas/AuditMetadata" }
    GetProfileResponse:
      type: object
      properties:
        profile: { $ref: "#/components/schemas/UserProfile" }
    SearchProfilesResponse:
      type: object
      properties:
        profiles:
          type: array
          items: { $ref: "#/components/schemas/UserProfile" }
        page: { $ref: "#/components/schemas/PageResponse" }
    UpdateProfileGatewayRequest:
      type: object
      required: [profile]
      properties:
        profile: { $ref: "#/components/schemas/UserProfile" }
        update_mask:
          type: array
          items: { type: string }
    UpdateProfileResponse:
      type: object
      properties:
        profile: { $ref: "#/components/schemas/UserProfile" }
    CreateReviewRequest:
      type: object
      required: [rating, text]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        match_id: { type: string }
    CreateReviewResponse:
      type: object
      properties:
        review: { $ref: "#/components/schemas/Review" }
    ListReviewsResponse:
      type: object
      properties:
        reviews:
          type: array
          items: { $ref: "#/components/schemas/Review" }
        page: { $ref: "#/components/schemas/PageResponse" }
    UpdateReviewGatewayRequest:
      type: object
      required: [review]
      properties:
        review: { $ref: "#/components/schemas/Review" }
        update_mask:
          type: array
          items: { type: string }
    UpdateReviewResponse:
      type: object
      properties:
        review: { $ref: "#/components/schemas/Review" }
    GetReputationSummaryResponse:
      type: object
      properties:
        reputation: { $ref: "#/components/schemas/ReputationSummary" }
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
  responses:
    Problem:
      description: Problem response
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
