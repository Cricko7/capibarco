services:
  user-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: user
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "25432:5432"

  redpanda:
    image: redpandadata/redpanda:v24.3.3
    command: ["redpanda","start","--overprovisioned","--smp","1","--memory","512M","--reserve-memory","0M","--node-id","0","--check=false","--kafka-addr","internal://0.0.0.0:29092,external://0.0.0.0:9092","--advertise-kafka-addr","internal://redpanda:29092,external://localhost:19093"]
    ports:
      - "19093:9092"

  user-service:
    build: .
    depends_on: [user-postgres, redpanda]
    environment:
      USER_DB_DSN: postgres://user:user@user-postgres:5432/user?sslmode=disable
      USER_KAFKA_BROKERS: redpanda:29092
      USER_GRPC_ADDR: 0.0.0.0:9090
      USER_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "18086:8080"
      - "19094:9090"
