openapi: 3.0.3
info:
  title: Analytics Service API
  version: 0.1.0
  description: API for ingesting analytics events and querying profile metrics.
servers:
  - url: http://localhost:18088
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: OK
  /readyz:
    get:
      summary: Readiness probe
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready
  /v1/events:
    post:
      summary: Ingest raw event idempotently
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestEventRequest'
      responses:
        '202':
          description: Accepted or duplicate ignored
        '400':
          description: Validation error
  /v1/profiles/{profileID}/metrics:
    get:
      summary: Query aggregated metrics by bucket
      parameters:
        - in: path
          name: profileID
          required: true
          schema:
            type: string
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: bucket
          schema:
            type: string
            enum: [minute, hour, day]
      responses:
        '200':
          description: Metrics list
  /v1/profiles/{profileID}/extended:
    get:
      summary: Extended statistics for entitled owners/shelters
      parameters:
        - in: path
          name: profileID
          required: true
          schema:
            type: string
        - in: query
          name: role
          required: true
          schema:
            type: string
            enum: [owner, shelter]
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Extended stats
        '403':
          description: Forbidden
  /v1/ranking-feedback:
    get:
      summary: Build ranking feedback payload for feed-service
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Ranking feedback
components:
  schemas:
    IngestEventRequest:
      type: object
      required: [profile_id, actor_id, type]
      properties:
        event_id:
          type: string
          format: uuid
        profile_id:
          type: string
        actor_id:
          type: string
        type:
          type: string
          enum: [view, feed_impression, swipe_left, swipe_right, ctr_click, card_open, chat_start, donation, boost, profile_change]
        occurred_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties:
            type: string
