openapi: 3.1.0
info:
  title: PetMatch Chat Service Operational API
  version: 0.1.0
  description: Operational HTTP endpoints for chat-service. Business API is gRPC in petmatch.chat.v1.ChatService.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Service dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "503":
          description: Service dependencies are not ready.
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus text exposition.
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    Status:
      type: object
      required: [status]
      properties:
        status:
          type: string
