services:
  notification-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notification
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.3.3
    command: ["redpanda","start","--overprovisioned","--smp","1","--memory","512M","--reserve-memory","0M","--node-id","0","--check=false","--kafka-addr","internal://0.0.0.0:29092,external://0.0.0.0:9092","--advertise-kafka-addr","internal://redpanda:29092,external://localhost:19093"]
    ports:
      - "19093:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:                             true'"]
      interval: 10s
      timeout: 10s
      retries: 12

  notification-service:
    build: .
    depends_on:
      notification-postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      NOTIFICATION_DB_DSN: postgres://notification:notification@notification-postgres:5432/notification?sslmode=disable
      NOTIFICATION_KAFKA_BROKERS: redpanda:29092
      NOTIFICATION_GRPC_ADDR: 0.0.0.0:9090
      NOTIFICATION_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "18084:8080"
      - "19094:9090"
