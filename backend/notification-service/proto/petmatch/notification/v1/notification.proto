syntax = "proto3";

package petmatch.notification.v1;

import "google/protobuf/timestamp.proto";
import "petmatch/common/v1/common.proto";

option go_package = "github.com/petmatch/petmatch/gen/go/petmatch/notification/v1;notificationv1";

// NotificationService owns device tokens, notification inboxes, and delivery orchestration.
service NotificationService {
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);
  rpc UnregisterDevice(UnregisterDeviceRequest) returns (UnregisterDeviceResponse);
  rpc CreateNotification(CreateNotificationRequest) returns (CreateNotificationResponse);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (MarkNotificationReadResponse);
  rpc StreamNotifications(StreamNotificationsRequest) returns (stream Notification);
}

enum NotificationChannel {
  NOTIFICATION_CHANNEL_UNSPECIFIED = 0;
  NOTIFICATION_CHANNEL_PUSH = 1;
  NOTIFICATION_CHANNEL_IN_APP = 2;
  NOTIFICATION_CHANNEL_EMAIL = 3;
}

enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_MATCH_CREATED = 1;
  NOTIFICATION_TYPE_CHAT_MESSAGE = 2;
  NOTIFICATION_TYPE_DONATION_SUCCEEDED = 3;
  NOTIFICATION_TYPE_BOOST_ACTIVATED = 4;
  NOTIFICATION_TYPE_REVIEW_CREATED = 5;
}

enum NotificationStatus {
  NOTIFICATION_STATUS_UNSPECIFIED = 0;
  NOTIFICATION_STATUS_PENDING = 1;
  NOTIFICATION_STATUS_DELIVERED = 2;
  NOTIFICATION_STATUS_FAILED = 3;
  NOTIFICATION_STATUS_READ = 4;
}

message DeviceToken {
  string device_token_id = 1;
  string profile_id = 2;
  string token = 3;
  string platform = 4;
  string locale = 5;
  bool active = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message Notification {
  string notification_id = 1;
  string recipient_profile_id = 2;
  NotificationType type = 3;
  repeated NotificationChannel channels = 4;
  string title = 5;
  string body = 6;
  map<string, string> data = 7;
  NotificationStatus status = 8;
  google.protobuf.Timestamp read_at = 9;
  google.protobuf.Timestamp created_at = 10;
}

message RegisterDeviceRequest {
  string profile_id = 1;
  string token = 2;
  string platform = 3;
  string locale = 4;
}

message RegisterDeviceResponse {
  DeviceToken device_token = 1;
}

message UnregisterDeviceRequest {
  string device_token_id = 1;
}

message UnregisterDeviceResponse {
  bool removed = 1;
}

message CreateNotificationRequest {
  string recipient_profile_id = 1;
  NotificationType type = 2;
  repeated NotificationChannel channels = 3;
  string title = 4;
  string body = 5;
  map<string, string> data = 6;
  string idempotency_key = 7;
}

message CreateNotificationResponse {
  Notification notification = 1;
}

message ListNotificationsRequest {
  string recipient_profile_id = 1;
  repeated NotificationStatus statuses = 2;
  petmatch.common.v1.PageRequest page = 3;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  petmatch.common.v1.PageResponse page = 2;
}

message MarkNotificationReadRequest {
  string notification_id = 1;
  string recipient_profile_id = 2;
}

message MarkNotificationReadResponse {
  Notification notification = 1;
}

message StreamNotificationsRequest {
  string recipient_profile_id = 1;
}

message NotificationRequestedEvent {
  petmatch.common.v1.EventEnvelope envelope = 1;
  Notification notification = 2;
}

message NotificationDeliveredEvent {
  petmatch.common.v1.EventEnvelope envelope = 1;
  string notification_id = 2;
  repeated NotificationChannel channels = 3;
}

message NotificationFailedEvent {
  petmatch.common.v1.EventEnvelope envelope = 1;
  string notification_id = 2;
  NotificationChannel channel = 3;
  string reason = 4;
}
