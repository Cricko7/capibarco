services:
  postgres:
    build:
      context: ./docker/postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:v24.3.3
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:29092,external://localhost:19093
    ports:
      - "19093:9092"
      - "19644:9644"

  redis:
    image: redis:7.4-alpine
    ports:
      - "16379:6379"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "19098:9000"
      - "19099:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -ec
      - |
        sleep 3
        mc alias set local http://minio:9000 minio minio123
        mc mb --ignore-existing local/petmatch-photos
        mc anonymous set download local/petmatch-photos

  migrate-auth:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/auth-service:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://auth:auth@postgres:5432/auth?sslmode=disable",
        "up"
      ]
    restart: "no"

  migrate-animal:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/animal-service:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://animal:animal@postgres:5432/animal?sslmode=disable",
        "up"
      ]
    restart: "no"

  migrate-billing:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/billing-service:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://billing:billing@postgres:5432/billing?sslmode=disable",
        "up"
      ]
    restart: "no"

  migrate-chat:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/chat-service:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://chat:chat@postgres:5432/chat?sslmode=disable",
        "up"
      ]
    restart: "no"

  migrate-feed:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/feed-service:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://feed:feed@postgres:5432/feed?sslmode=disable",
        "up"
      ]
    restart: "no"

  migrate-matching:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/matching-service:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://matching:matching@postgres:5432/matching?sslmode=disable",
        "up"
      ]
    restart: "no"

  migrate-user:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/user-service:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://user:user@postgres:5432/user?sslmode=disable",
        "up"
      ]
    restart: "no"

  migrate-analytics:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/analytics-service:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://analytics:analytics@postgres:5432/analytics?sslmode=disable",
        "up"
      ]
    restart: "no"

  ensure-notification-db:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    entrypoint:
      - /bin/sh
      - -ec
      - |
        psql -h postgres -U postgres -d postgres -tc "select 1 from pg_roles where rolname = 'notification'" | grep -q 1 || \
          psql -h postgres -U postgres -d postgres -c "create user notification with password 'notification'"
        psql -h postgres -U postgres -d postgres -tc "select 1 from pg_database where datname = 'notification'" | grep -q 1 || \
          createdb -h postgres -U postgres -O notification notification
    restart: "no"

  migrate-notification:
    image: migrate/migrate:v4.18.3
    depends_on:
      ensure-notification-db:
        condition: service_completed_successfully
    volumes:
      - ./notification-service/migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://notification:notification@postgres:5432/notification?sslmode=disable",
        "up"
      ]
    restart: "no"

  kafka-init:
    image: redpandadata/redpanda:v24.3.3
    depends_on:
      redpanda:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -ec
      - |
        sleep 5
        for topic in \
          animal.profile_created \
          animal.profile_updated \
          animal.profile_published \
          animal.profile_archived \
          animal.photo_added \
          animal.status_changed \
          matching.swipe_recorded \
          matching.match_created \
          matching.match_archived \
          chat.conversation_created \
          billing.donation_succeeded \
          billing.donation_failed \
          billing.boost_activated \
          billing.boost_expired \
          billing.entitlement_granted \
          billing.payment_failed \
          chat.message_sent \
          analytics.animal_stats_aggregated \
          auth.user_registered \
          auth.user_login_succeeded \
          auth.user_login_failed \
          auth.token_refreshed \
          auth.logout \
          auth.password_reset_requested \
          auth.password_reset_completed \
          auth.role_assigned \
          auth.permission_checked \
          gateway.request_rejected \
          gateway.websocket_connected \
          gateway.websocket_disconnected \
          notification.requested \
          notification.delivered \
          notification.failed \
          notification.read \
          user.profile_updated \
          user.review_created; do
          rpk topic create "$$topic" --brokers redpanda:29092 --partitions 3 --replicas 1 || true
        done

  auth-service:
    build:
      context: ./auth-service
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://auth:auth@postgres:5432/auth?sslmode=disable
      GRPC_ADDR: :50051
      HTTP_ADDR: :8080
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: redpanda:29092
      KAFKA_CLIENT_ID: auth-service
      KAFKA_ALLOW_AUTO_TOPIC_CREATION: "true"
      JWT_ISSUER: authsvc
      JWT_AUDIENCE: internal-services
      ACCESS_TTL: 15m
      REFRESH_TTL: 720h
      RESET_TTL: 15m
    ports:
      - "18080:8080"
      - "15051:50051"

  animal-service:
    build:
      context: ./animal-service
    depends_on:
      migrate-animal:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      ANIMAL_POSTGRES_URL: postgres://animal:animal@postgres:5432/animal?sslmode=disable
      ANIMAL_KAFKA_ENABLED: "true"
      ANIMAL_KAFKA_BROKERS: redpanda:29092
      ANIMAL_GRPC_ADDR: 0.0.0.0:9090
      ANIMAL_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "18081:8080"
      - "19090:9090"

  billing-service:
    build:
      context: ./billing-service
    depends_on:
      migrate-billing:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      BILLING_POSTGRES_DSN: postgres://billing:billing@postgres:5432/billing?sslmode=disable
      BILLING_HTTP_ADDR: :8080
      BILLING_GRPC_ADDR: :9090
      BILLING_PAYMENT_MOCK_SECRET_KEY: local-development-secret
      BILLING_EVENTS_PUBLISHER: kafka
      BILLING_EVENTS_BROKERS: redpanda:29092
    ports:
      - "18082:8080"
      - "19091:9090"

  chat-service:
    build:
      context: ./chat-service
    depends_on:
      auth-service:
        condition: service_started
      migrate-chat:
        condition: service_completed_successfully
    environment:
      CHAT_POSTGRES_DSN: postgres://chat:chat@postgres:5432/chat?sslmode=disable
      CHAT_AUTH_ADDRESS: auth-service:50051
      CHAT_GRPC_ADDRESS: 0.0.0.0:9090
      CHAT_HTTP_ADDRESS: 0.0.0.0:8080
    ports:
      - "18083:8080"
      - "19092:9090"

  feed-service:
    build:
      context: ./feed-service
    depends_on:
      migrate-feed:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      FEED_STORAGE: postgres
      FEED_POSTGRES_DSN: postgres://feed:feed@postgres:5432/feed?sslmode=disable
      FEED_KAFKA_ENABLED: "true"
      FEED_KAFKA_BROKERS: redpanda:29092
      FEED_GRPC_ADDR: :8081
      FEED_HTTP_ADDR: :8080
    ports:
      - "18084:8080"
      - "18085:8081"

  matching-service:
    build:
      context: ./matching-service
    depends_on:
      chat-service:
        condition: service_started
      migrate-matching:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      MATCHING_DB_DSN: postgres://matching:matching@postgres:5432/matching?sslmode=disable
      MATCHING_KAFKA_BROKERS: redpanda:29092
      MATCHING_KAFKA_CLIENT_ID: matching-service
      MATCHING_KAFKA_GROUP_ID: matching-service
      MATCHING_CHAT_ADDRESS: chat-service:9090
      MATCHING_GRPC_ADDR: 0.0.0.0:9090
      MATCHING_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "18086:8080"
      - "19094:9090"

  user-service:
    build:
      context: ./user-service
    depends_on:
      migrate-user:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      USER_DB_DSN: postgres://user:user@postgres:5432/user?sslmode=disable
      USER_KAFKA_BROKERS: redpanda:29092
      USER_GRPC_ADDR: 0.0.0.0:9090
      USER_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "18087:8080"
      - "19095:9090"

  notification-service:
    build:
      context: ./notification-service
    depends_on:
      migrate-notification:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      NOTIFICATION_DB_DSN: postgres://notification:notification@postgres:5432/notification?sslmode=disable
      NOTIFICATION_KAFKA_ENABLED: "true"
      NOTIFICATION_KAFKA_BROKERS: redpanda:29092
      NOTIFICATION_KAFKA_CLIENT_ID: notification-service
      NOTIFICATION_KAFKA_GROUP_ID: notification-service
      NOTIFICATION_GRPC_ADDR: 0.0.0.0:9090
      NOTIFICATION_HTTP_ADDR: 0.0.0.0:8080
    ports:
      - "18089:8080"
      - "19097:9090"

  analytics-service:
    build:
      context: ./analytics-service
    depends_on:
      migrate-analytics:
        condition: service_completed_successfully
    environment:
      ANALYTICS_POSTGRES_DSN: postgres://analytics:analytics@postgres:5432/analytics?sslmode=disable
      ANALYTICS_HTTP_ADDR: :8080
      ANALYTICS_GRPC_ADDR: :9090
      ANALYTICS_APP_ENV: local
    ports:
      - "18090:8080"
      - "19096:9090"

  api-gateway:
    build:
      context: ./api-gateway
    depends_on:
      auth-service:
        condition: service_started
      animal-service:
        condition: service_started
      feed-service:
        condition: service_started
      matching-service:
        condition: service_started
      chat-service:
        condition: service_started
      billing-service:
        condition: service_started
      analytics-service:
        condition: service_started
      notification-service:
        condition: service_started
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      API_GATEWAY_HTTP_ADDR: 0.0.0.0:8080
      API_GATEWAY_GRPC_AUTH_ADDR: auth-service:50051
      API_GATEWAY_GRPC_ANIMAL_ADDR: animal-service:9090
      API_GATEWAY_GRPC_FEED_ADDR: feed-service:8081
      API_GATEWAY_GRPC_MATCHING_ADDR: matching-service:9090
      API_GATEWAY_GRPC_CHAT_ADDR: chat-service:9090
      API_GATEWAY_GRPC_BILLING_ADDR: billing-service:9090
      API_GATEWAY_GRPC_USER_ADDR: user-service:9090
      API_GATEWAY_GRPC_ANALYTICS_ADDR: analytics-service:9090
      API_GATEWAY_GRPC_NOTIFICATION_ENABLED: "true"
      API_GATEWAY_GRPC_NOTIFICATION_ADDR: notification-service:9090
      API_GATEWAY_REDIS_ADDR: redis:6379
      API_GATEWAY_KAFKA_ENABLED: "true"
      API_GATEWAY_KAFKA_BROKERS: redpanda:29092
      API_GATEWAY_S3_ENABLED: "true"
      API_GATEWAY_S3_ENDPOINT: minio:9000
      API_GATEWAY_S3_ACCESS_KEY: minio
      API_GATEWAY_S3_SECRET_KEY: minio123
      API_GATEWAY_S3_BUCKET: petmatch-photos
      API_GATEWAY_S3_PUBLIC_URL: http://localhost:19098/petmatch-photos
      API_GATEWAY_AUTH_TENANT_ID: default
      API_GATEWAY_AUTH_GUEST_SECRET: local-development-guest-secret
    ports:
      - "18088:8080"

volumes:
  postgres-data:
  minio-data:
